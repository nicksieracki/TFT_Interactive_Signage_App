name: BUILD

on:
    push:
        branches: [develop, trunk, release/**, rc/**, release, main]
    workflow_dispatch:

permissions:
    contents: write

jobs:
    setup:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: '2'

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'

            - name: Cache node modules
              id: cache
              uses: actions/cache@v5
              with:
                  path: node_modules
                  key: ${{ runner.os }}-build-${{ hashFiles('**/package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-build-

            - name: Install dependencies
              if: steps.cache.outputs.cache-hit != 'true'
              run: npm ci

            - name: Get short hash
              id: vars
              run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

            - name: Extract branch name
              id: branch_name
              shell: bash
              run: echo "name=$(echo ${GITHUB_REF#refs/heads/} | sed 's/\//_/g')" >> $GITHUB_OUTPUT

            - name: Extract build configuration
              shell: bash
              id: build_ext
              run: |
                  if [[ ${{ steps.branch_name.outputs.name }} == "release" ]] || [[ ${{ steps.branch_name.outputs.name }} == "release"* ]] || [[ ${{ steps.branch_name.outputs.name }} == "main" ]]
                  then
                      echo "configuration=production" >> $GITHUB_OUTPUT
                      echo "deploy_branch=prod" >> $GITHUB_OUTPUT
                  elif [[ ${{ steps.branch_name.outputs.name }} == "rc"* ]]
                  then
                      echo "configuration=production" >> $GITHUB_OUTPUT
                      echo "deploy_branch=uat" >> $GITHUB_OUTPUT
                  else
                      echo "configuration=production" >> $GITHUB_OUTPUT
                      echo "deploy_branch=dev" >> $GITHUB_OUTPUT
                  fi

        outputs:
            configuration: ${{ steps.build_ext.outputs.configuration }}
            deploy_branch: ${{ steps.build_ext.outputs.deploy_branch }}
            short_sha: ${{ steps.vars.outputs.sha_short }}

    test:
        runs-on: ubuntu-latest
        needs: setup
        steps:
            - uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'

            - name: Cache node modules
              id: cache
              uses: actions/cache@v5
              with:
                  path: node_modules
                  key: ${{ runner.os }}-build-${{ hashFiles('**/package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-build-

            - name: Install dependencies
              if: steps.cache.outputs.cache-hit != 'true'
              run: npm ci

            - name: Run unit tests
              run: npm run test -- --run

    build:
        runs-on: ubuntu-latest
        needs: [setup, test]
        env:
            configuration: ${{ needs.setup.outputs.configuration }}
            deploy_branch: ${{ needs.setup.outputs.deploy_branch }}
            short_sha: ${{ needs.setup.outputs.short_sha }}
        steps:
            - uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'

            - name: Cache node modules
              id: cache
              uses: actions/cache@v5
              with:
                  path: node_modules
                  key: ${{ runner.os }}-build-${{ hashFiles('**/package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-build-

            - name: Install dependencies
              if: steps.cache.outputs.cache-hit != 'true'
              run: npm ci

            - name: Initialise Pipeline Chat Status
              uses: fjogeleit/http-request-action@master
              continue-on-error: true
              with:
                  url: ${{ secrets.STATUS_URL }}
                  data: '{ "chat_url": "${{ secrets.CHAT_URL }}", "name": "${{ github.repository }}", "commit": "${{ github.sha }}", "pipeline_name": "signage-wayfinder", "branch": "${{ github.ref }}", "status": "processing", "url": "https://github.com/${{ github.repository }}/runs/${{ github.run_id }}" }'

            - name: Build application
              run: npm run build

            - name: Deploy the application
              uses: s0/git-publish-subdir-action@develop
              env:
                  REPO: self
                  BRANCH: build/signage-wayfinder/${{ env.deploy_branch }}
                  FOLDER: dist
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  MESSAGE: 'build(signage-wayfinder): CI build from {sha}'

            - name: Update Pipeline Chat Status
              uses: fjogeleit/http-request-action@master
              continue-on-error: true
              with:
                  url: ${{ secrets.STATUS_URL }}
                  data: '{ "name": "${{ github.repository }}", "commit": "${{ github.sha }}", "pipeline_name": "signage-wayfinder", "branch": "${{ github.ref }}", "status": "${{ job.status }}", "url": "https://github.com/${{ github.repository }}/runs/${{ github.run_id }}" }'
              if: ${{ always() }}
